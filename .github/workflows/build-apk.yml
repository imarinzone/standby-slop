name: Android APK Build CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'
          gradle-home-cache-cleanup: false

      - name: Create .env file
        run: cp .env.example .env

      - name: Decode Keystores and Prep Placeholders
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            # Secure debug keystore fallback to make sure config phase doesn't crash on missing file
            touch debug.keystore
          fi
          # Touch release keystore placeholder to satisfy AGP evaluation phase safely
          touch my-upload-key.jks

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Create GitHub Release (Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Standby Display ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Release APK with Custom Name
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/standby-slop-v1.0.${{ github.run_number }}.apk

      - name: Create GitHub Release (Dynamic Build Tag)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/standby-slop-v1.0.${{ github.run_number }}.apk
          tag_name: v1.0.${{ github.run_number }}
          name: standby-slop-v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
